<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | Seminario Tech</title>
    <link rel="stylesheet" href="/assets/css/dashboard.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

<div class="dashboard">
    <aside class="sidebar">
        <div class="logo-area">
            <h2>Seminario Tech</h2>
            <p id="panelSubtitulo">Panel profesional</p>
        </div>

        <ul class="menu-links" id="menuLinks"></ul>
    </aside>

    <main class="main-panel">
        <header class="top-header">
            <div>
                <h1 id="saludoUsuario">Bienvenido</h1>
                <p id="descripcionPanel">Cargando tu panel...</p>
            </div>

            <div class="header-actions">
                <button id="modoToggle" class="theme-toggle" type="button" aria-label="Cambiar tema">
                    Modo
                </button>

                <div class="profile-box">
                    <div class="profile-circle" id="letraUsuario">U</div>

                    <div>
                        <h3 id="nombreUsuario">Usuario</h3>
                        <span id="tipoCuentaUsuario">Cuenta activa</span>
                    </div>
                </div>
            </div>
        </header>

        <div id="dashboardMessage" class="dashboard-message" hidden></div>
        <div id="dashboardContent"></div>
    </main>
</div>

<script src="/assets/js/api.js"></script>
<script src="/assets/js/dashboard.js"></script>

</body>
</html>
